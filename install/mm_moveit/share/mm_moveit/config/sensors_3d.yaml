sensors:
  - oak_camera
oak_camera:
  far_clipping_plane_distance: 6.0
  point_cloud_topic: /depth_camera/points
  filtered_cloud_topic: /filtered_cloud
  max_update_rate: 2.0
  near_clipping_plane_distance: 0.2
  padding_offset: 0.02
  max_range: 3.0
  padding_scale: 1.0
  queue_size: 5
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
  shadow_threshold: 0.2