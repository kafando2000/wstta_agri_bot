laser_filter:
  ros__parameters:
    filter_chain:
      - name: robot_tower_box
        type: laser_filters/LaserScanBoxFilter
        params:
          box_frame: base_link
          # Define the min/max 3D boundaries to crop out
          min_x: -0.1
          max_x: 0.1
          min_y: -0.1
          max_y: 0.1
          min_z: -0.5
          max_z: 0.5