ekf_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false

    # Coordinate frame definitions
    map_frame: map              # Defaults to "map"
    odom_frame: odom            # Defaults to "odom"
    base_link_frame: base_link  # Change to your robot's base frame if different
    world_frame: odom           # EKF outputs the local odom transform

    # 1. WHEEL ODOMETRY CONFIGURATION
    odom0: /odom                # Your wheel odometry topic name
    odom0_config: [true,  true,  false,  # Track X and Y position
                   false, false, true,   # Track Yaw orientation
                   true,  true,  false,  # Track X and Y linear velocity
                   false, false, true,   # Track Yaw angular velocity
                   false, false, false]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # 2. IMU CONFIGURATION
    imu0: /imu            # Your IMU topic name
    imu0_config: [false, false, false,  # Positions are not provided by IMU
                  false, false, true,   # Track Yaw orientation (Absolute)
                  false, false, false,  # Velocities are not directly provided
                  false, false, true,   # Track Yaw angular velocity (Highly accurate)
                  true,  true,  false]  # Track X and Y linear acceleration
    imu0_queue_size: 10
    imu0_differential: false
    imu0_relative: true          # Highly recommended: zeroes out IMU orientation initialization errors
    imu0_remove_gravitational_acceleration: true
