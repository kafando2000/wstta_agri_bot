

services:
  ros2_docker:
    build:
      context: .
      dockerfile: Dockerfile.master_ros2
      args:
        docker_user_name: "${USER}"         # or "robot" if you want to hardcode
        ros_ws: "Ros2_ws"            # matches your example
        UID: "${UID:-1000}"                 # fallback to 1000 if UID not set
        GID: "${GID:-1000}"                 # fallback to 1000 if GID not set
    image: my_ros2_dev:v0.1
    container_name: ros2_dev2
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all      
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /home/${USER}/Ros2_ws:/home/${USER}/Ros2_ws:rw
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    network_mode: host
    command: bash
    stdin_open: true
    tty: true